on:
  workflow_dispatch:

jobs:
  job_1:
    strategy: # تم تصحيح السبلنج هنا
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ["14.x", "16.x", "18.x"] # إضافة علامات تنصيص وتصحيح الـ X
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
      - run: node -v
