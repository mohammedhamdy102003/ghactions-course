on:
  workflow_dispatch:

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - name: first job
        run: echo job ${{ github.job }}

  job2:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: second job
        run: echo job ${{ github.job }}

  job3:
    runs-on: ubuntu-latest
    needs: job1
    steps:
      - name: third job
        run: echo job ${{ github.job }}
  job4:
    runs-on: ubuntu-latest
    needs: 
      - job2
      -  job3
    steps:
      - name: fourth job
        run: echo job ${{ github.job }}
    
